<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="clean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#clean)"/>
  <!-- Cellules photovoltaïques propres -->
  <g stroke="#0a0e15" stroke-width="2" fill="#1e3a8a">
    <rect x="40" y="60" width="115" height="80"/>
    <rect x="170" y="60" width="115" height="80"/>
    <rect x="300" y="60" width="115" height="80"/>
    <rect x="430" y="60" width="115" height="80"/>
    <rect x="560" y="60" width="115" height="80"/>
    <rect x="40" y="155" width="115" height="80"/>
    <rect x="170" y="155" width="115" height="80"/>
    <rect x="300" y="155" width="115" height="80"/>
    <rect x="430" y="155" width="115" height="80"/>
    <rect x="560" y="155" width="115" height="80"/>
    <rect x="40" y="250" width="115" height="80"/>
    <rect x="170" y="250" width="115" height="80"/>
    <rect x="300" y="250" width="115" height="80"/>
    <rect x="430" y="250" width="115" height="80"/>
    <rect x="560" y="250" width="115" height="80"/>
  </g>
  <!-- Reflets brillants -->
  <rect x="40" y="60" width="635" height="270" fill="url(#reflect)"/>
  <ellipse cx="500" cy="100" rx="80" ry="20" fill="white" opacity="0.25"/>
  <ellipse cx="200" cy="200" rx="40" ry="10" fill="white" opacity="0.2"/>
  <text x="400" y="450" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="white" opacity="0.85">
    Après nettoyage
  </text>
</svg>
